# Dependabot config for entviz-rs.
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Rust crate dependencies — keep Cargo.lock fresh so a known-good tree is
  # always available and security fixes land promptly. Grouped into one PR to
  # keep review noise low for this small dependency set.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      include: scope
    groups:
      cargo:
        patterns:
          - "*"

  # GitHub Actions versions — node20 → node24 deprecations are exactly the
  # class of change that bites CI (see ~/.claude/CLAUDE.md "GitHub Actions
  # versions"). Actions are pinned by commit SHA with `# vN` comments, which
  # Dependabot bumps alongside the SHA. Batched into one PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

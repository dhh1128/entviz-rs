name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Third-party actions are pinned by full commit SHA (node24-runtime / composite
# versions, resolved 2026-06-19). A mutable tag like @v6 can be silently
# retargeted; Dependabot bumps the SHAs (with the `# vN` comment) weekly.
jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
        with:
          tool: cargo-audit

      # Fail on a known RUSTSEC advisory in the dependency tree. cargo-audit
      # reads Cargo.lock and queries the RustSec advisory DB; it does not build
      # the crate. The runtime dependency set is small (sha2, base64, hex) plus
      # serde_json for the conformance CLI.
      - name: Audit dependencies (RUSTSEC)
        run: cargo audit

  coverage:
    name: coverage floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
        with:
          tool: cargo-llvm-cov

      # Hard coverage gate. Default features only: the off-by-default
      # `adversarial` module (model.rs) is excluded from the public impl and is
      # not counted here. The reference corpus is intentionally NOT checked out —
      # the unit + CLI tests already exercise every path the corpus does, so the
      # floor is self-contained and deterministic. Line coverage currently sits
      # ~99%; the floors leave ~1% of jitter headroom. --fail-under-file-lines
      # additionally catches a single new file landing well below the average.
      - name: Coverage (fail under floor)
        run: cargo llvm-cov --locked --fail-under-lines 98 --fail-under-file-lines 90

  conformance:
    name: Tier-A conformance (full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The entviz reference repo carries the algorithm spec, SPEC_VERSION, the
      # golden conformance corpus, and the single authoritative Python runner
      # this crate is certified against. PINNED to tag v0.15.0: that tag carries
      # the enhanced runner (--skip-file, external-impl invariant pairs, and the
      # spec-version-match assertion). NOTE: bumping this crate's SPEC_VERSION
      # later REQUIRES bumping this pin in lockstep — the runner asserts the
      # corpus spec_version equals the impl's data-entviz-version and fails
      # loudly on a mismatch. Sparse-checkout only `compliance` (corpus + runner)
      # and `src` (the entviz package the runner imports for model extraction).
      - name: Check out the entviz reference (spec + corpus + runner)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          ref: v0.15.0
          path: entviz-ref
          sparse-checkout: |
            compliance
            src
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      # setup-python@v6.0.0 runs on the node24 runtime (verified: action.yml
      # `using: node24`).
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.x'

      - name: Install the Tier-A harness (lxml only; no rasterizer needed)
        run: pip install lxml

      - name: Build the conformance binary
        run: cargo build --release --bin entviz-conformance --locked

      # Full Tier A (render model) + error-rejection + invariant pairs +
      # spec-version-match. No --skip-file: entviz-rs is FULL conformance, so
      # every corpus vector must pass. The runner's own spec-version-match
      # assertion guards corpus/impl agreement. Only trusted workspace paths are
      # interpolated.
      - name: Tier-A conformance (full corpus, hard gate)
        run: |
          set -euo pipefail
          bin="${GITHUB_WORKSPACE}/target/release/entviz-conformance"
          cd entviz-ref
          PYTHONPATH=src:. python -m compliance.runner --impl-cmd "${bin}" --tiers A

  conformance-tier-b:
    name: Tier-B conformance (raster, full)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # Same pinned reference as the Tier-A job (see that job's note): tag
      # v0.15.0 carries the enhanced runner, and the pin must move with this
      # crate's SPEC_VERSION.
      - name: Check out the entviz reference (spec + corpus + runner)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          ref: v0.15.0
          path: entviz-ref
          sparse-checkout: |
            compliance
            src
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.x'

      # Tier B rasterizes the SVG and compares against the golden PNG, so the
      # harness additionally needs cairosvg + pillow (and the system Cairo lib).
      - name: Install the Tier-B harness (lxml + cairosvg + pillow)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcairo2
          pip install lxml "cairosvg==2.9.0" pillow numpy

      - name: Build the conformance binary
        run: cargo build --release --bin entviz-conformance --locked

      - name: Tier-B conformance (full corpus, hard gate)
        run: |
          set -euo pipefail
          bin="${GITHUB_WORKSPACE}/target/release/entviz-conformance"
          cd entviz-ref
          PYTHONPATH=src:. python -m compliance.runner --impl-cmd "${bin}" --tiers B

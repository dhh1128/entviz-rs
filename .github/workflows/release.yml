name: Release

# Tag-triggered publish. scripts/release.py (human-run) bumps + tags; this
# workflow re-runs the FULL CI gate set (fmt+clippy+test, coverage floor, and
# Tier-A conformance — mirroring ci.yml so a direct-push tag can never ship a
# crate that would have failed CI), verifies the tag matches Cargo.toml,
# publishes to crates.io, and creates the GitHub release. Requires the
# CARGO_REGISTRY_TOKEN repo secret. Actions are pinned by node24/composite
# commit SHA, matching ci.yml. No untrusted github.event.* data is interpolated
# (only the trusted tag ref GITHUB_REF_NAME, which only a maintainer who can
# push tags controls).
on:
  push:
    tags:
      - "v*"

# Least privilege: read-only by default. contents:write is granted ONLY to the
# publish job (the single job that creates the GitHub release); the gate,
# coverage, and conformance jobs run with no write access.
permissions:
  contents: read

jobs:
  gate:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Gate (fmt + clippy + test)
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features --locked -- -D warnings
          cargo test --locked

  coverage:
    name: coverage floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3  # v2.82.3
        with:
          tool: cargo-llvm-cov

      # Hard coverage gate (mirrors ci.yml). Default features only; the
      # off-by-default `adversarial` module is excluded from the public impl and
      # not counted here.
      - name: Coverage (fail under floor)
        run: cargo llvm-cov --locked --fail-under-lines 98 --fail-under-file-lines 90

  conformance:
    name: spec-sync + Tier-A conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The entviz reference repo carries the algorithm spec, SPEC_VERSION, and
      # the golden conformance corpus this crate is certified against.
      - name: Check out the entviz reference (spec + corpus)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: dhh1128/entviz
          path: entviz-ref
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build the conformance binary
        run: cargo build --release --bin entviz-conformance --locked

      - name: Install the Tier-A harness (lxml only; no rasterizer needed)
        run: |
          set -euo pipefail
          python3 -m venv /tmp/harness
          /tmp/harness/bin/pip install --quiet --upgrade pip
          /tmp/harness/bin/pip install --quiet lxml

      # Tier A (render model) + error-rejection vectors. On a release tag the
      # spec versions are expected to match, so this is a hard gate; the
      # drift-tolerant warning path mirrors ci.yml. No untrusted GitHub event
      # data is interpolated here (only trusted workspace paths).
      - name: Spec-version sync check + Tier-A conformance
        run: |
          set -euo pipefail
          ours=$(grep -oP 'SPEC_VERSION: &str = "\Kv[0-9]+' src/lib.rs)
          ref=$(grep -oP 'SPEC_VERSION = "\Kv[0-9]+' entviz-ref/src/entviz/__init__.py)
          echo "entviz-rs targets spec ${ours}; reference impl/spec is ${ref}"
          bin="${GITHUB_WORKSPACE}/target/release/entviz-conformance"
          run_conformance() {
            ( cd entviz-ref \
              && PYTHONPATH=src:. /tmp/harness/bin/python -m compliance.runner \
                   --impl-cmd "${bin}" --tiers A )
          }
          if [ "${ours}" = "${ref}" ]; then
            echo "Spec versions match — conformance is a hard gate."
            run_conformance
          else
            echo "::warning title=Spec drift::reference impl/spec is ${ref} but entviz-rs targets ${ours} — an upgrade is needed"
            if [ "${ref#v}" -gt "${ours#v}" ]; then
              echo "Reference is AHEAD; the corpus run is informational while this crate catches up."
              run_conformance || echo "::warning title=Conformance::failed against the newer reference corpus (expected while behind)"
            else
              echo "This crate is ahead of the reference — hard gate."
              run_conformance
            fi
          fi

  publish:
    name: publish + GitHub release
    runs-on: ubuntu-latest
    needs: [gate, coverage, conformance]
    # contents:write is scoped to THIS job only — the one that creates the
    # GitHub release. cargo publish itself needs no GITHUB_TOKEN write access.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Verify the tag matches Cargo.toml
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(grep -oP '^version = "\K[^"]+' Cargo.toml)
          echo "tag=${tag} Cargo.toml=${pkg}"
          if [ "${tag}" != "${pkg}" ]; then
            echo "::error::tag ${tag} does not match Cargo.toml version ${pkg}"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes
